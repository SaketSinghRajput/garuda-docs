<title>Project Garuda — Architecture Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;

  .page {
    background: #ffffff;

    padding: 40px;

  .print-tip {

    padding: 8px;

    border-radius: 6px;

  @media print { .print-tip { display: none; } }

  svg { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 600; fill: inherit; }
  .ts { font-size: 12px; font-weight: 400; fill: #555; }
  .arr { stroke: #aaa; stroke-width: 1.5; fill: none; }
  .leader { stroke: #bbb; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }

  /* Color ramps — light mode only (white bg) */

  .c-teal   .th { fill: #085041; } .c-teal .ts { fill: #0F6E56; }
